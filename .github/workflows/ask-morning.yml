name: Утренний вопрос про окошки

on:
  schedule:
    - cron: "0 6 * * *"   # 09:00 МСК (UTC+3, без перевода времени)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ask:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Отправить вопрос в Telegram
        working-directory: scripts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_question.py
      - name: Сохранить состояние
        run: |
          git config user.name "lupalova-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/last_question.json
          git diff --quiet --cached || git commit -m "state: вопрос отправлен"
          git push
