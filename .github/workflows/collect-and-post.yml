name: Сбор ответов и сторис

on:
  schedule:
    - cron: "5-55/10 6-17 * * *"   # каждые 10 минут, 09:05–20:55 МСК (UTC+3, без перевода времени)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Проверить чат и при необходимости собрать сторис
        working-directory: scripts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python collect_and_render.py
      - name: Сохранить состояние
        run: |
          git config user.name "lupalova-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/offset.json state/collected_today.json
          git diff --quiet --cached || git commit -m "state: обновление"
          git pull --rebase --quiet
          git push
